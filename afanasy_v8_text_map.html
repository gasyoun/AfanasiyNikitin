function mY(lat){return Math.log(Math.tan(Math.PI/4+lat*Math.PI/360));}

function project(lon,lat){return[PAD+(lon-LON0)/(LON1-LON0)*(W-2*PAD),PAD+(mY1-mY(lat))/(mY1-mY0)*(H-2*PAD)];}

function cumKmAt(tv){
  for(let i=0;i<WP.length-1;i++){if(tv>=WP[i][2]&&tv<=WP[i+1][2]){const f=(tv-WP[i][2])/(WP[i+1][2]-WP[i][2]);return CUM_KM[i]+f*(CUM_KM[i+1]-CUM_KM[i]);}}
  return CUM_KM[CUM_KM.length-1];
}

  {n:'Ширван',c:'rgba(120,175,110,0.3)',b:'rgba(70,130,55,0.65)',lp:[49.5,40],poly:[[47,38],[49,42],[52,41],[52,38],[49,37]]},
  {n:'Ак-Коюнлу',c:'rgba(200,135,85,0.27)',b:'rgba(155,88,45,0.62)',lp:[50,35.2],poly:[[38,37],[43,42],[50,42],[56,39],[62,36],[60,30],[54,27],[48,27],[44,30],[38,33],[36,36]]},

  {n:'Делийский\nсултанат',c:'rgba(205,175,100,0.27)',b:'rgba(160,120,48,0.58)',lp:[74,31],poly:[[68,25],[78,28],[80,30],[80,35],[74,36],[70,34],[67,30],[67,27]]},
  {n:'Гуджарат',c:'rgba(165,205,150,0.27)',b:'rgba(105,162,78,0.58)',lp:[71,22],poly:[[68,20],[74,20],[76,23],[73,25],[69,25],[67,23]]},
  {n:'Бахманиды',c:'rgba(100,155,210,0.3)',b:'rgba(50,95,175,0.65)',lp:[76.5,17.5],poly:[[73,14],[80,14],[80,20],[77,21],[73,19],[72,17]]},
  {n:'Виджаянагара',c:'rgba(210,165,110,0.27)',b:'rgba(165,108,55,0.58)',lp:[76,11.5],poly:[[72,8],[80,8],[80,14],[73,14],[70,12]]},
  {n:'Османы',c:'rgba(215,100,80,0.23)',b:'rgba(175,55,38,0.58)',lp:[35.5,36],poly:[[28,36],[38,38],[42,38],[42,36],[40,33],[36,31],[30,31],[28,33]]},
  {n:'Мамлюки',c:'rgba(225,195,100,0.23)',b:'rgba(180,140,48,0.58)',lp:[35,27.5],poly:[[30,22],[38,22],[40,30],[36,32],[30,31],[29,25]]},
];

const CITIES=[
  {n:'Москва',lon:37.6,lat:55.7,a:'e'},{n:'Константинополь',lon:28.9,lat:41.0,a:'e'},
  {n:'Тебриз',lon:46.3,lat:38.1,a:'n'},{n:'Каир',lon:31.2,lat:30.1,a:'e'},
  {n:'Багдад',lon:44.4,lat:33.3,a:'e'},{n:'Исфахан',lon:51.7,lat:32.7,a:'e'},
  {n:'Мекка',lon:39.8,lat:21.5,a:'e'},{n:'Герат',lon:62.2,lat:34.3,a:'n'},
  {n:'Самарканд',lon:66.9,lat:39.7,a:'n'},{n:'Казань',lon:49.1,lat:55.8,a:'e'},
  {n:'Дели',lon:77.2,lat:28.6,a:'e'},{n:'Каликут',lon:75.8,lat:11.2,a:'w'},
  {n:'Гоа',lon:73.8,lat:15.5,a:'w'},{n:'Кафа',lon:35.4,lat:45.0,a:'e'},
];

let t=0,playing=false,lastTs=null,mapReady=false,activeWP=-1,prevSeg=-1;

function lerp(a,b,f){return a+(b-a)*f;}
function curPos(){
  for(let i=0;i<WP.length-1;i++){if(t>=WP[i][2]&&t<=WP[i+1][2]){const f=(t-WP[i][2])/(WP[i+1][2]-WP[i][2]);return[lerp(WP[i][0],WP[i+1][0],f),lerp(WP[i][1],WP[i+1][1],f)];}}
  return[WP[WP.length-1][0],WP[WP.length-1][1]];
}
function curWPIdx(){let b=0;for(let i=0;i<WP.length;i++)if(WP[i][2]<=t)b=i;return b;}

function polyPath(c,poly){c.beginPath();let f=true;for(const[lo,la] of poly){const[x,y]=project(lo,la);if(f){c.moveTo(x,y);f=false;}else c.lineTo(x,y);}c.closePath();}
function halo(c,txt,x,y,al){c.textAlign=al;c.strokeStyle='rgba(255,255,255,0.55)';c.lineWidth=2;c.strokeText(txt,x,y);c.fillText(txt,x,y);}
function labelXY(cx,cy,a){return a==='e'?[cx+4,cy+3]:a==='w'?[cx-4,cy+3]:a==='n'?[cx,cy-4]:[cx,cy+9];}
function labelAl(a){return a==='e'?'left':a==='w'?'right':'center';}

function buildOffscreen(world){
  const d3p=d3.geoTransform({point(lo,la){const[x,y]=project(lo,la);this.stream.point(x,y);}});
  const path=d3.geoPath(d3p,oc);
  const land=topojson.feature(world,world.objects.land);
  const borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  oc.save();oc.beginPath();oc.rect(0,0,W,H);oc.clip();
  oc.fillStyle='#8fb8d0';oc.fillRect(0,0,W,H);
  oc.beginPath();path(land);oc.fillStyle='#e8e1cc';oc.fill();oc.strokeStyle='#b8a870';oc.lineWidth=0.5;oc.stroke();
  for(const s of STATES){polyPath(oc,s.poly);oc.fillStyle=s.c;oc.fill();polyPath(oc,s.poly);oc.strokeStyle=s.b;oc.lineWidth=1.1;oc.stroke();}
  oc.beginPath();path(borders);oc.strokeStyle='rgba(120,100,60,0.18)';oc.lineWidth=0.4;oc.stroke();
  for(const s of STATES){
    const[lx,ly]=project(s.lp[0],s.lp[1]);
    if(lx<PAD+1||lx>W-PAD-1||ly<PAD+1||ly>H-PAD-1)continue;
    const lines=s.n.split('\n');oc.font='bold 9.5px sans-serif';oc.fillStyle='rgba(22,10,3,0.75)';
    lines.forEach((l,i)=>halo(oc,l,lx,ly+(i-(lines.length-1)/2)*11,'center'));
  }
  for(const city of CITIES){
    const[cx,cy]=project(city.lon,city.lat);
    if(cx<PAD+1||cx>W-PAD-1||cy<PAD+1||cy>H-PAD-1)continue;
    oc.beginPath();oc.arc(cx,cy,2.5,0,Math.PI*2);oc.fillStyle='rgba(35,15,5,0.65)';oc.fill();
    const[lx,ly]=labelXY(cx,cy,city.a);
    oc.font='italic 9px sans-serif';oc.fillStyle='rgba(20,8,2,0.75)';
    halo(oc,city.n,lx,ly,labelAl(city.a));
  }
  oc.strokeStyle='rgba(70,100,135,0.09)';oc.lineWidth=0.5;
  for(let lo=30;lo<=80;lo+=10){const[x,y0]=project(lo,LAT0+.2);const[,y1]=project(lo,LAT1-.2);oc.beginPath();oc.moveTo(x,y0);oc.lineTo(x,y1);oc.stroke();}
  for(let la=20;la<=60;la+=10){const[x0,y]=project(LON0+.2,la);const[x1]=project(LON1-.2,la);oc.beginPath();oc.moveTo(x0,y);oc.lineTo(x1,y);oc.stroke();}
  oc.restore();
}

function drawFrame(){
  if(!mapReady){ctx.fillStyle='#8fb8d0';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('Загрузка…',W/2,H/2);return;}
  ctx.drawImage(off,0,0);
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,H);ctx.clip();
  const seg=curWPIdx();
  const[clat,clng]=curPos();
  const[cpx,cpy]=px(clat,clng);

  ctx.setLineDash([3,6]);ctx.strokeStyle='rgba(70,40,15,0.13)';ctx.lineWidth=1.3;
  ctx.beginPath();let first=true;
  for(const w of WP){const[x,y]=px(w[0],w[1]);if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);}
  ctx.stroke();ctx.setLineDash([]);

  ctx.strokeStyle='#8B3510';ctx.lineWidth=2.3;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();const[sx,sy]=px(WP[0][0],WP[0][1]);ctx.moveTo(sx,sy);
  for(let i=1;i<=seg;i++){const[x,y]=px(WP[i][0],WP[i][1]);ctx.lineTo(x,y);}
  ctx.lineTo(cpx,cpy);ctx.stroke();

  for(let i=0;i<=seg;i++){
    const[x,y]=px(WP[i][0],WP[i][1]);
    const isActive=(i===activeWP);
    ctx.beginPath();ctx.arc(x,y,isActive?7:4.5,0,Math.PI*2);
    ctx.fillStyle=isActive?'#e09520':i===0?'#5C2A10':'#C05520';ctx.fill();
    ctx.strokeStyle=isActive?'#ffdd80':'#3A1008';ctx.lineWidth=isActive?1.5:0.8;ctx.stroke();
    const lbl=WP[i][3].split('(')[0].split('/')[0].trim();
    ctx.font=`${isActive?'bold ':''} 10px sans-serif`;ctx.fillStyle='rgba(20,8,2,0.88)';
    halo(ctx,lbl,x,y-9,'center');
  }

  const pulse=2.5+Math.sin(Date.now()/280)*1.5;
  ctx.beginPath();ctx.arc(cpx,cpy,pulse+4,0,Math.PI*2);ctx.fillStyle='rgba(220,140,26,0.2)';ctx.fill();
  ctx.beginPath();ctx.arc(cpx,cpy,4.5,0,Math.PI*2);ctx.fillStyle='#E09520';ctx.fill();
  ctx.strokeStyle='#5C2A10';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

function updateInfo(){
  const seg=curWPIdx(),yr=Math.floor(1467+t/100*8);
  const km=cumKmAt(t);
  document.getElementById('yr').firstChild.textContent=yr;
  document.getElementById('yrL').textContent=yr;
  document.getElementById('sea').textContent=WP[seg][6];
  document.getElementById('dist').textContent=Math.round(km/VERST).toLocaleString('ru')+' вёрст ('+Math.round(km).toLocaleString('ru')+' км)';
  document.getElementById('loc').textContent=WP[seg][3]+' · '+WP[seg][4];
  document.getElementById('dsc').textContent=WP[seg][5];
  document.getElementById('sl').value=Math.round(t*10);
  if(seg!==prevSeg){prevSeg=seg;setActivePassage(seg,true);}
}

function setActivePassage(idx,scroll){
  activeWP=idx;
  document.querySelectorAll('.af-passage').forEach((el,i)=>{
    el.classList.toggle('active',i===idx);
  });
  if(scroll){
    const el=document.querySelector(`.af-passage[data-wp="${idx}"]`);
    if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

function buildTextPanel(){
  const container=document.getElementById('texts');
  WP.forEach((w,i)=>{
    const div=document.createElement('div');
    div.className='af-passage';
    div.dataset.wp=i;
    div.innerHTML=`<div class="af-pw"><span class="af-pn">${i+1}</span><span>${w[3]}</span></div><div class="af-pt">${PASSAGES[i]}</div>`;
    div.addEventListener('click',()=>{seekTo(w[2]);setActivePassage(i,false);});
    container.appendChild(div);
  });
}

C.addEventListener('click',e=>{
  const rect=C.getBoundingClientRect();
  const sx=C.width/rect.width,sy=C.height/rect.height;
  const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
  const seg=curWPIdx();
  let best=Infinity,bestI=-1;
  for(let i=0;i<=seg;i++){const[x,y]=px(WP[i][0],WP[i][1]);const d=Math.hypot(x-mx,y-my);if(d<best){best=d;bestI=i;}}
  if(best<18&&bestI>=0){seekTo(WP[bestI][2]);setActivePassage(bestI,true);}
});

function frame(ts){
  if(lastTs===null)lastTs=ts;
  if(playing){const dt=Math.min(ts-lastTs,100);t=Math.min(100,t+dt*0.0007);if(t>=100){t=100;playing=false;updBtn();}}
  lastTs=ts;drawFrame();updateInfo();
  requestAnimationFrame(frame);
}
function updBtn(){document.getElementById('ico').className=playing?'ti ti-player-pause':'ti ti-player-play';}
window.togglePlay=function(){playing=!playing;if(playing&&t>=100)t=0;lastTs=null;updBtn();};
window.seekTo=function(v){t=Math.max(0,Math.min(100,v));playing=false;lastTs=null;updBtn();};

const GEO=WP.map((w,i)=>`| ${i+1} | ${w[3]} | ${w[0]}° N | ${w[1]}° E | ${w[4]} |`).join('\n');
const blob=new Blob([`# Геолокации пути Афанасия Никитина\n\n| # | Место | Широта | Долгота | Дата |\n|---|-------|--------|---------|------|\n${GEO}\n`],{type:'text/markdown'});
document.getElementById('dlBtn').href=URL.createObjectURL(blob);

buildTextPanel();

let initialWP = 0;
const urlParams = new URLSearchParams(window.location.search);
const wpParam = urlParams.get('wp');
if (wpParam !== null) {
  const wpIdx = parseInt(wpParam, 10);
  if (wpIdx >= 0 && wpIdx < WP.length) {
    initialWP = wpIdx;
    t = WP[wpIdx][2];
  }
}
setActivePassage(initialWP, false);
if (initialWP > 0) {
  setTimeout(() => {
    setActivePassage(initialWP, true);
  }, 300);
}

function waitLib(cb){if(typeof d3!=='undefined'&&typeof topojson!=='undefined')cb();else setTimeout(()=>waitLib(cb),60);}
waitLib(()=>{
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r=>r.json()).then(w=>{buildOffscreen(w);mapReady=true;});
  requestAnimationFrame(frame);
});
})();
</script>

  <!-- Floating Theme Toggle -->
  <button id="theme-toggle" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000; width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--color-border-primary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.15); transition: transform 0.2s, background-color 0.2s;" title="Переключить тему">
    <i class="ti ti-moon" id="theme-icon" style="font-size: 20px;"></i>
  </button>
  <script>
  (function(){
    const html = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    
    // Ensure Tabler Icons CSS is loaded if not already loaded in the document
    if (!document.querySelector('link[href*="tabler-icons"]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css';
      document.head.appendChild(link);
    }

    function updateTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (icon) {
        icon.className = theme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
      }
    }
    const saved = localStorage.getItem('theme') || 'light';
    updateTheme(saved);
    if (toggle) {
      toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme') || 'light';
        updateTheme(current === 'dark' ? 'light' : 'dark');
      });
      toggle.addEventListener('mouseenter', () => { toggle.style.transform = 'scale(1.1)'; });
      toggle.addEventListener('mouseleave', () => { toggle.style.transform = 'scale(1.0)'; });
    }
  })();
  </script>
