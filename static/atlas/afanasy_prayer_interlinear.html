<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Афанасий Никитин — Подстрочник полиглотной молитвы</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/atlas.css">
  <link rel="stylesheet" href="lib/tabler-icons.min.css">
  <style>
    .pr-intro{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;margin-bottom:8px;max-width:880px;}
    .pr-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
    .pr-tab{padding:5px 11px;border:0.5px solid var(--color-border-tertiary);border-radius:999px;background:var(--color-background-primary);
      font-size:12px;color:var(--color-text-secondary);cursor:pointer;transition:all .14s;display:flex;gap:6px;align-items:center;min-height:30px;}
    .pr-tab:hover{background:var(--color-background-secondary);}
    .pr-tab.active{border-color:var(--color-accent);color:var(--color-text-primary);background:var(--color-background-secondary);font-weight:500;}
    .pr-tab .pr-fol{font-size:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:3px;padding:0 4px;font-variant-numeric:tabular-nums;}
    .pr-tab.active .pr-fol{background:var(--color-accent);color:var(--color-background-primary);border-color:var(--color-accent);}

    .pr-stats{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;}
    .pr-stat{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 11px;min-width:84px;}
    .pr-stat-v{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.05;font-variant-numeric:tabular-nums;}
    .pr-stat-l{font-size:10px;color:var(--color-text-secondary);margin-top:2px;}
    .pr-stat.accent .pr-stat-v{color:var(--color-accent);}

    .pr-wrap{display:flex;gap:12px;align-items:flex-start;}
    .pr-main{flex:1 1 0;min-width:0;}
    .pr-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:8px;}
    .pr-modes{display:inline-flex;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
    .pr-modes button{border:0;border-radius:0;padding:6px 12px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;min-height:32px;}
    .pr-modes button + button{border-left:0.5px solid var(--color-border-tertiary);}
    .pr-modes button.active{background:var(--color-accent);color:var(--color-background-primary);font-weight:500;}
    .pr-ar-toggle{display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--color-text-secondary);cursor:pointer;user-select:none;}

    .pr-legend{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
    .pr-lg{display:inline-flex;gap:5px;align-items:center;font-size:11px;color:var(--color-text-secondary);
      padding:3px 9px;border:0.5px solid var(--color-border-tertiary);border-radius:999px;cursor:pointer;background:var(--color-background-primary);min-height:26px;}
    .pr-lg .dot{width:10px;height:10px;border-radius:50%;}
    .pr-lg.off{opacity:.4;}
    .pr-lg.solo{border-color:var(--color-accent);}

    .pr-reading{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;
      max-height:calc(100vh - 360px);overflow-y:auto;background:var(--color-background-primary);}

    /* reading (running text) mode */
    .pr-read-text{font-family:var(--font-serif);font-size:17px;line-height:2.0;}
    .pr-tok{border-radius:3px;padding:1px 3px;cursor:pointer;transition:background .12s,box-shadow .12s;}
    .pr-tok:hover{box-shadow:0 0 0 1.5px var(--tok-color);}
    .pr-tok.active{box-shadow:0 0 0 2px var(--color-accent);}
    .pr-tok.dim{opacity:.25;}
    .pr-tok-ru{color:var(--color-text-secondary);} /* russian frame stays muted */

    /* interlinear mode */
    .pr-inter{display:flex;flex-wrap:wrap;gap:9px 12px;}
    .pr-cell{display:flex;flex-direction:column;gap:1px;cursor:pointer;border-radius:5px;padding:5px 7px;border:0.5px solid transparent;transition:all .12s;min-width:40px;}
    .pr-cell:hover{border-color:var(--tok-color);background:var(--color-background-secondary);}
    .pr-cell.active{border-color:var(--color-accent);background:var(--color-background-secondary);}
    .pr-cell.dim{opacity:.28;}
    .pr-cell .c-tok{font-family:var(--font-serif);font-size:15.5px;color:var(--tok-text);font-weight:500;}
    .pr-cell .c-tr{font-size:10.5px;color:var(--color-text-secondary);font-style:italic;}
    .pr-cell .c-ar{font-size:14px;color:var(--tok-text);direction:rtl;}
    .pr-cell .c-g{font-size:11.5px;color:var(--color-text-primary);}
    .pr-cell .c-name{font-size:9px;font-variant-numeric:tabular-nums;color:var(--color-accent);font-weight:600;}

    .pr-src{font-size:10.5px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5;}

    .pr-detail{flex:0 0 268px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;display:flex;flex-direction:column;}
    .pr-det-head{padding:9px 13px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;justify-content:space-between;align-items:center;gap:8px;}
    .pr-det-tok{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--color-text-primary);}
    .pr-det-lang{font-size:10px;padding:2px 7px;border-radius:999px;color:#fff;white-space:nowrap;}
    .pr-det-body{padding:12px 13px;font-size:12.5px;line-height:1.6;}
    .pr-det-row{margin-bottom:9px;}
    .pr-det-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:1px;}
    .pr-det-val{color:var(--color-text-primary);}
    .pr-det-ar{font-size:22px;direction:rtl;color:var(--color-text-primary);}
    .pr-det-tr{font-style:italic;}
    .pr-det-note{font-size:11.5px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:2px;}
    .pr-det-empty{padding:22px 14px;font-size:12px;color:var(--color-text-secondary);text-align:center;line-height:1.55;}
    .pr-xlinks{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .pr-xlink{font-size:11px;display:inline-flex;gap:5px;align-items:center;text-decoration:none;color:var(--color-text-secondary);
      border:0.5px solid var(--color-border-tertiary);border-radius:999px;padding:4px 10px;background:var(--color-background-primary);}
    .pr-xlink:hover{color:var(--color-text-primary);border-color:var(--color-accent);}

    @media (max-width:760px){
      .pr-wrap{flex-direction:column;}
      .pr-detail{flex:1 1 auto;width:100%;}
      .pr-reading{max-height:none;}
      .pr-read-text{font-size:16px;}
    }
  </style>
</head>

      <h1><span class="lang-ru">Подстрочник полиглотной молитвы</span><span class="lang-en">Interlinear of the Polyglot Prayer</span></h1>

    <p class="pr-intro" id="intro"></p>
    <div class="pr-tabs" id="tabs"></div>
    <div class="pr-stats" id="stats"></div>

    <div class="pr-wrap">
      <div class="pr-main">
        <div class="pr-controls">
          <div class="pr-modes" id="modes" role="tablist">
            <button data-mode="read" class="active">Чтение</button>
            <button data-mode="inter">Подстрочник</button>
            <button data-mode="names">99 имён</button>

        </div>
        <div class="pr-legend" id="legend"></div>
        <div class="pr-reading" id="reading"></div>
        <div class="pr-src" id="src"></div>
      </div>

      <aside class="pr-detail">
        <div class="pr-det-head">
          <span class="pr-det-tok" id="det-tok">Слово</span>
          <span class="pr-det-lang" id="det-lang" style="display:none;"></span>

          <div class="pr-det-empty">Нажмите любое слово в молитве, чтобы увидеть язык, оригинал и значение.</div>
        </div>
      </aside>
    </div>
  </div>

          {t:'олло ты', l:'ar', tr:'ollo ty', g:'«Ты Бог» (араб. Allāh + рус. «ты»).'},
          {t:'олло акъберъ', l:'ar', tr:'ollo ak’ber’', ar:'الله أكبر', arTr:'Allāhu akbar', g:'«Бог великий».'},
          {t:'олло рагымъ', l:'ar', tr:'ollo ragym’', ar:'الله رحيم', arTr:'Allāh raḥīm', g:'«Бог милосердный».'},
          {t:'олло керимъ', l:'ar', tr:'ollo kerim’', ar:'الله كريم', arTr:'Allāh karīm', g:'«Бог милостивый, щедрый».'},
          {t:'олло рагымелъло', l:'ar', tr:'ollo ragymel’lo', ar:'الله رحيم الله', arTr:'Allāh raḥīm Allāh', g:'«Всемилосерднейший».'},
          {t:'олло каримелло', l:'ar', tr:'ollo karimello', ar:'الله كريم الله', arTr:'Allāh karīm Allāh', g:'«Всемилостивейший».'},
          {t:'танъ таньгресень', l:'tt', tr:'tan’ tangresen’', g:'тюрк. «Ты Бог» (täñri sen).'},
          {t:'худосеньсень', l:'fa', tr:'xudosen’sen’', g:'перс.-тюрк. «Ты Господь» (xudā sen sen).'},
          {t:'Богъ един, тъй царь славы, творець небу и земли', l:'ru', tr:'', g:'Русская рамка: «Бог един, тот царь славы, творец небу и земли».', frame:true},
        ]
      },
      { id:'f50', fol:'Ф. 50–51', tru:'Молитва-ламент (пост)', ten:'Lament prayer (the fast)',
        intro:'Дневниковая запись о посте «з бесермены»: Афанасий месяц не ел мяса и молился Вседержителю «никоторого именем» — снова мешая русский, тюркский, арабский и персидский.',
        src:'Хожение 1986, с. 50 (перевод в [квадратных скобках] оттуда же); Хрусталёв 2026, §§50–51 (Ф. 50–51).',
        tokens:[
          {t:'А иду я на Русь', l:'ru', tr:'', g:'Рамка дневника: «А иду я на Русь».', frame:true},
          {t:'кѣтъмышьтыр имень, урусь тутътым', l:'tt', tr:'ketmyshtyr imen, urus tuttym', g:'тюрк. [с думою:] «погибла вера моя, постился я бусурманским постом».'},
          {t:'богь олло', l:'fa', tr:'bog’ ollo', ar:'الله', arTr:'(bog) Allāh', g:'«Господи Боже».'},
          {t:'богъ керим', l:'ar', tr:'bog’ kerim', ar:'كريم', arTr:'karīm', g:'«Бог милостивый».'},
          {t:'богъ рагимъ', l:'ar', tr:'bog’ ragim’', ar:'رحيم', arTr:'raḥīm', g:'«Бог милосердный».'},
          {t:'богь худо', l:'fa', tr:'bog’ xudo', ar:'خدا', arTr:'xudā', g:'«Бог Господь».'},
          {t:'богъ акьберь', l:'ar', tr:'bog’ ak’ber’', ar:'أكبر', arTr:'akbar', g:'«Бог великий».'},
          {t:'олло варенно', l:'fa', tr:'ollo varenno', g:'«Бог зиждитель» (по переводу 1986 г.).'},
          {t:'олло рагимельно', l:'ar', tr:'ollo ragimel’no', ar:'الله رحيم', arTr:'Allāh raḥīm', g:'«Бог всемилостивейший».'},
          {t:'сеньсень олло ты', l:'tt', tr:'sen’sen’ ollo ty', g:'тюрк.-рус. «это всё ты, о Господи!» (sen sen — ты и есть).'},
        ]
      },
      { id:'f97', fol:'Ф. 97', tru:'Крик у берегов «Эфиопии»', ten:'Cry off the “Ethiopian” shore',
        intro:'Месяц в открытом океане без видимой земли; завидев «горы Эфиопскыа» (сомалийский берег), все на судне в страхе кричат — а Афанасий тут же даёт русский перевод их возгласа.',
        src:'Хожение 1986; Хрусталёв 2026, §97 (Ф. 97). Русский перевод — в самом тексте «Хожения».',
        tokens:[
          {t:'Олло перводигер', l:'fa', tr:'Ollo pervodiger', ar:'الله پروردگار', arTr:'Allāh parwardigār', g:'«Боже-Промыслитель».'},
          {t:'олло конъкар', l:'ar', tr:'ollo kon’kar', ar:'الله قهار', arTr:'Allāh qahhār', g:'«Бог Покоряющий».'},
          {t:'бизим баши мудна насинь больмышьти', l:'tt', tr:'bizim baši… bolmyšti', g:'тюрк. возглас ужаса мореходов («над нашими головами…»).'},
          {t:'Боже осподарю, боже, боже вышний, царю небесный, здѣ нам судил еси погибнути!', l:'ru', tr:'', g:'Русский перевод возгласа, который Афанасий приводит сам: «здесь ты судил нам погибнуть!»', frame:true},
        ]
      },
    ];

    // ── State ─────────────────────────────────────────────────────────────
    let cur = 0, mode = 'read', langFilter = null, showArabic = false, activeTok = -1;

    const $ = id => document.getElementById(id);

    function visibleTokens(p){ return p.tokens; }

    // ── Renderers ─────────────────────────────────────────────────────────
    function renderTabs(){
      $('tabs').innerHTML = PRAYERS.map((p,i)=>
        `<button class="pr-tab${i===cur?' active':''}" data-i="${i}">
           <span class="pr-fol">${p.fol}</span><span>${p.tru}</span></button>`).join('');
      $('tabs').querySelectorAll('.pr-tab').forEach(b=>
        b.onclick=()=>{cur=+b.dataset.i;activeTok=-1;langFilter=null;renderAll();});
    }

    function computeStats(p){
      const toks = p.tokens;
      const words = toks.filter(t=>!t.frame).length;
      const langs = new Set(toks.filter(t=>!t.frame).map(t=>t.l));
      const nonRu = toks.filter(t=>!t.frame && t.l!=='ru').length;
      const pct = words ? Math.round(nonRu/words*100) : 0;
      const names = toks.filter(t=>t.name).length;
      return {words, langs:langs.size, pct, names};
    }

    function renderStats(){
      const s = computeStats(PRAYERS[cur]);
      let html =
        `<div class="pr-stat"><div class="pr-stat-v">${s.words}</div><div class="pr-stat-l">слов/формул</div></div>`+
        `<div class="pr-stat"><div class="pr-stat-v">${s.langs}</div><div class="pr-stat-l">языка</div></div>`+
        `<div class="pr-stat"><div class="pr-stat-v">${s.pct}%</div><div class="pr-stat-l">не по-русски</div></div>`;
      if(s.names) html += `<div class="pr-stat accent"><div class="pr-stat-v">${s.names} / 99</div><div class="pr-stat-l">имён Аллаха</div></div>`;
      $('stats').innerHTML = html;
    }

    function renderLegend(){
      const present = [...new Set(PRAYERS[cur].tokens.map(t=>t.l))];
      $('legend').innerHTML = ['ar','fa','tt','ru'].filter(k=>present.includes(k)).map(k=>{
        const off = langFilter && langFilter!==k;
        return `<span class="pr-lg${off?' off':''}${langFilter===k?' solo':''}" data-l="${k}">
          <span class="dot" style="background:${cv(LANGS[k].c)}"></span>${LANGS[k].ru}</span>`;
      }).join('');
      $('legend').querySelectorAll('.pr-lg').forEach(el=>
        el.onclick=()=>{langFilter = langFilter===el.dataset.l ? null : el.dataset.l; renderReading(); renderLegend();});
    }

    function dim(t){ return langFilter && t.l!==langFilter && !t.frame; }

    function renderReading(){
      const p = PRAYERS[cur];
      const box = $('reading');
      if(mode==='read'){
        box.className = 'pr-reading';
        box.innerHTML = `<div class="pr-read-text">${
          p.tokens.map((t,i)=>{
            const dd = dim(t) || (langFilter && t.frame);
            return `<span class="pr-tok${t.frame?' pr-tok-ru':''}${i===activeTok?' active':''}${dd?' dim':''}"
              style="--tok-color:${cv(LANGS[t.l].c)};--tok-text:${cv(LANGS[t.l].t)};background:color-mix(in srgb, ${cv(LANGS[t.l].c)} 16%, transparent);color:${cv(LANGS[t.l].t)}"
              data-i="${i}">${t.t}</span>`;
          }).join(' ')
        }</div>`;
      } else if(mode==='inter'){
        box.className = 'pr-reading';
        box.innerHTML = `<div class="pr-inter">${
          p.tokens.map((t,i)=>{
            const dd = dim(t);
            return `<div class="pr-cell${i===activeTok?' active':''}${dd?' dim':''}"
              style="--tok-color:${cv(LANGS[t.l].c)};--tok-text:${cv(LANGS[t.l].t)}" data-i="${i}">
              <span class="c-tok">${t.t}</span>
              ${t.tr?`<span class="c-tr">${t.tr}</span>`:''}
              ${showArabic&&t.ar?`<span class="c-ar">${t.ar}</span>`:''}
              <span class="c-g">${t.g}</span>
              ${t.name?`<span class="c-name">имя №${t.name}</span>`:''}
            </div>`;
          }).join('')
        }</div>`;
      } else { // names
        box.className = 'pr-reading';
        const named = p.tokens.filter(t=>t.name);
        if(!named.length){
          box.innerHTML = `<div class="pr-det-empty">В этом фрагменте нет цепочки «прекрасных имён». Откройте вкладку «${PRAYERS[0].fol}».</div>`;
        } else {
          box.innerHTML = `<div class="pr-inter">${
            named.map(t=>{
              const i = p.tokens.indexOf(t);
              return `<div class="pr-cell${i===activeTok?' active':''}"
                style="--tok-color:${cv(LANGS.ar.c)};--tok-text:${cv(LANGS.ar.t)}" data-i="${i}">
                <span class="c-name">№${t.name}</span>
                <span class="c-tok">${t.t}</span>
                <span class="c-ar" style="opacity:1">${t.ar}</span>
                <span class="c-tr">${t.arTr}</span>
                <span class="c-g">${t.g}</span>
              </div>`;
            }).join('')
          }</div>`;
        }
      }
      box.querySelectorAll('[data-i]').forEach(el=>
        el.onclick=()=>{activeTok=+el.dataset.i; renderReading(); renderDetail();});
      $('src').textContent = '⌖ ' + p.src;
    }

    function renderDetail(){
      const p = PRAYERS[cur];
      const t = p.tokens[activeTok];
      const body = $('det-body'), tokEl = $('det-tok'), langEl = $('det-lang');
      if(!t){
        tokEl.textContent='Слово'; langEl.style.display='none';
        body.innerHTML='<div class="pr-det-empty">Нажмите любое слово в молитве, чтобы увидеть язык, оригинал и значение.</div>';
        return;
      }
      tokEl.textContent = t.t.length>22 ? t.t.slice(0,21)+'…' : t.t;
      langEl.style.display='';
      langEl.textContent = LANGS[t.l].ru;
      langEl.style.background = cv(LANGS[t.l].c);
      let h='';
      if(t.name) h+=`<div class="pr-det-row"><div class="pr-det-lbl">Имя Аллаха</div><div class="pr-det-val">№ ${t.name} из 99 (Asmā’ al-ḥusnā)</div></div>`;
      h+=`<div class="pr-det-row"><div class="pr-det-lbl">Оригинал (как в тексте)</div><div class="pr-det-val" style="font-family:var(--font-serif)">${t.t}</div></div>`;
      if(t.tr) h+=`<div class="pr-det-row"><div class="pr-det-lbl">Транслитерация</div><div class="pr-det-val pr-det-tr">${t.tr}</div></div>`;
      if(t.ar) h+=`<div class="pr-det-row"><div class="pr-det-lbl">Источник</div><div class="pr-det-ar">${t.ar}</div><div class="pr-det-val pr-det-tr">${t.arTr||''}</div></div>`;
      h+=`<div class="pr-det-row"><div class="pr-det-lbl">Значение</div><div class="pr-det-val">${t.g}</div></div>`;
      h+=`<div class="pr-xlinks">
        <a class="pr-xlink" href="afanasy_language_map_v2.html"><i class="ti ti-map-2"></i>языки текста</a>
        <a class="pr-xlink" href="afanasy_manuscripts.html"><i class="ti ti-versions"></i>три списка</a>
        <a class="pr-xlink" href="afanasy_religious_crisis.html"><i class="ti ti-cross"></i>Господи / Аллах</a>
      </div>`;
      body.innerHTML = h;
    }

    function renderAll(){ renderTabs(); $('intro').textContent=PRAYERS[cur].intro; renderStats(); renderLegend(); renderReading(); renderDetail(); }

    // ── Controls ──────────────────────────────────────────────────────────
    $('modes').querySelectorAll('button').forEach(b=>
      b.onclick=()=>{mode=b.dataset.mode;
        $('modes').querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b));
        activeTok=-1; renderReading(); renderDetail();});
    $('arToggle').onchange = e=>{showArabic=e.target.checked; if(mode==='inter') renderReading();};

    renderAll();
  })();
  </script>

  <button id="theme-toggle" aria-label="Переключить тему" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000; width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--color-border-primary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-floating-control);" title="Переключить тему">
    <i class="ti ti-moon" id="theme-icon" style="font-size: 20px;"></i>
  </button>
  <script src="js/atlas-theme.js"></script>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') location.href = 'index.html';
      if (e.key === 'd' && !e.ctrlKey && !e.metaKey && !e.altKey && e.target.tagName !== 'INPUT') {
        document.getElementById('theme-toggle')?.click();
      }
    });
  </script>
  <script src="js/atlas-export.js"></script>
</body>
</html>
