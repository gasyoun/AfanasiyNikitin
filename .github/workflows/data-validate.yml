name: data-validate

on:
  push:
    paths:
      - 'data/**'
      - 'datapackage.json'
      - 'tools/validate_*.py'
      - 'tools/validate_widgets.cjs'
      - 'tools/build_*.py'
      - 'tools/computus.py'
      - 'afanasy_*.html'
      - 'js/atlas-spine.js'
      - '.github/workflows/data-validate.yml'
  pull_request:
    paths:
      - 'data/**'
      - 'datapackage.json'
      - 'tools/**'
      - 'afanasy_*.html'
      - 'js/atlas-spine.js'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Informational: Frictionless schema/FK validation of the data package.
      - name: Install Frictionless
        run: pip install frictionless
        continue-on-error: true
      - name: Frictionless validate (informational)
        run: frictionless validate datapackage.json
        continue-on-error: true

      # Gates: these must pass.
      - name: Validate data spine
        run: python tools/validate_data.py
      - name: Validate Linked Places Format
        run: python tools/validate_lpf.py
      - name: Validate widget fallbacks (spine drift)
        run: node tools/validate_widgets.cjs
